name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        env:
          # Pages serves project sites from /<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      # Pushing a gh-pages branch auto-enables Pages on public repos —
      # no admin token needed, unlike the actions/deploy-pages flow.
      - name: Publish to gh-pages
        working-directory: web/dist
        run: |
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy ${{ github.sha }}"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
