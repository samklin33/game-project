name: build-data

# Rebuilds road data from Overpass and commits it to the triggering branch.
# Parameterized by city so adding cities later is a dispatch, not a code change.
on:
  push:
    paths:
      - "scripts/build_roads.py"
      - ".github/workflows/build-data.yml"
  workflow_dispatch:
    inputs:
      city:
        description: "City name as tagged in OSM"
        default: "臺北市"
        required: true
      out:
        description: "Output GeoJSON path"
        default: "data/taipei.geojson"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # push events carry no inputs — fall back to Taipei
      CITY: ${{ inputs.city || '臺北市' }}
      OUT: ${{ inputs.out || 'data/taipei.geojson' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build road GeoJSON
        run: |
          mkdir -p "$(dirname "$OUT")"
          python scripts/build_roads.py --city "$CITY" --out "$OUT" | tee stats.txt

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUT"
          git diff --cached --quiet && { echo "data unchanged, nothing to commit"; exit 0; }
          git commit -m "data: build $OUT for $CITY" -m "$(cat stats.txt)"
          git push
